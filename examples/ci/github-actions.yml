# Copy this file to .github/workflows/logito-ci.yml in your repository.
# See https://logito.dev/docs/ci for full documentation.

name: Logito CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

env:
  LOGITO_API_KEY: ${{ secrets.LOGITO_API_KEY }}

jobs:
  logito:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Logito
        run: curl -fsSL https://get.logito.dev | sh && echo "$HOME/.logito/bin" >> $GITHUB_PATH

      - name: Start app
        run: docker compose up -d && sleep 5

      - name: Run tests
        run: npm test

      - name: Logito check
        run: logito ci check
